name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Run API contract tests
        run: npm run test:contract
        env:
          NODE_ENV: test

      - name: Run security penetration smoke tests
        run: npm run test:security
        env:
          NODE_ENV: test

      - name: Verify load test script
        run: npm run test:load:smoke

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint:qa

      - name: Run frontend build
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-lint-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npm run dev -- --host 0.0.0.0 --port 4173
          wait-on: http://127.0.0.1:4173
          wait-on-timeout: 120
          command: npm run cypress:run
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:4173
